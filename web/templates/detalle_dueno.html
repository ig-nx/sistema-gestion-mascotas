{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">
  <h1 class="text-center my-4">Detalle del Dueño</h1>
</div>

<div class="container mt-4">
  <table class="table table-bordered table-striped">
    <tbody>
      <tr>
        <th scope="row" class="text-center">Nombre</th>
        <td>{{ dueno.nombre }}</td>
      </tr>
      <tr>
        <th scope="row" class="text-center">Telefono</th>
        <td>{{ dueno.telefono }}</td>
      </tr>
    </tbody>
  </table>
</div>

<div class="container mt-4">
  <h2 class="text-center my-3">Mascotas</h2>
  <table class="table table-bordered table-striped">
    <thead>
      <tr>
        <th scope="col">
          <div class="text-center">Nombre</div>
        </th>
        <th scope="col">
          <div class="text-center">Especie</div>
        </th>
      </tr>
    </thead>
    <tbody>
      {% for mascota in dueno.mascotas.all %}
      <tr>
        <td>{{ mascota.nombre }}</td>
        <td>{{ mascota.especie }}</td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="2" class="text-center">Sin mascotas registradas</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
